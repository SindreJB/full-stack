spring.application.name=calculator-backend
server.port=8081
jwt.secret=calculator-app-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration-ms=300000

spring.datasource.url=jdbc:h2:file:/data/calculatordb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
